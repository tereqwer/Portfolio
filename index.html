<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pavlo Tereshchuk — Motion Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    #hero {
      height: 100vh;
      height: 100dvh;
      position: relative;
    }

    /* Окремо для html та body прибираємо фіксовану висоту */
    html,
    body {
      width: 100%;
      min-height: 100%;
      /* Тепер body може рости вниз */
      background: var(--bg);
      overflow-x: hidden;
      overflow-y: auto;
      cursor: none;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --text: #edeae0;
      --accent-grad: linear-gradient(135deg,
          #a259ff 0%,
          #ff6b6b 50%,
          #ffa500 100%);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --nav-h: 64px;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      overflow-x: hidden;
      /* Ховаємо горизонтальний скрол стрічок */
      overflow-y: auto;
      /* Вмикаємо вертикальний скрол сайту */
      cursor: none;
      scroll-behavior: smooth;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Cursor ── */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--text);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: transform 0.1s ease;
    }

    .cursor-ring {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(237, 234, 224, 0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition:
        width 0.25s ease,
        height 0.25s ease,
        opacity 0.25s ease;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(2rem, 4vw, 4rem);
      opacity: 0;
      animation: fadeDown 0.7s 0.1s var(--ease-out) forwards;
    }

    nav a {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: opacity 0.2s;
    }

    nav a::after {
      content: "";
      display: block;
      height: 1px;
      background: var(--text);
      width: 100%;
      transform: scaleX(0.4);
      transform-origin: left;
      transition:
        transform 0.3s var(--ease-out),
        opacity 0.3s;
      opacity: 0.35;
    }

    nav a:hover {
      opacity: 0.65;
    }

    nav a:hover::after {
      transform: scaleX(1);
      opacity: 1;
    }

    /* ── Hero ── */
    #hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Title — прямо під nav */
    .hero-title {
      position: absolute;
      top: 7vh;
      left: 3%;
      transform: translateX(-50%);
      /* Центруємо по горизонталі */
      width: auto;
      /* Важливо: ширина тільки по тексту */
      white-space: nowrap;
      z-index: 1;
      font-family: "Bebas Neue", sans-serif;
      color: var(--text);
      line-height: 0.8;
      text-align: center;
      opacity: 0;
      animation: fadeDown 0.9s 0.35s var(--ease-out) forwards;
    }

    /* Якщо текст розбитий на спани і ти хочеш їх один під одним */
    .hero-title span {
      display: block;
      text-align: center;
      width: 100%;
    }

    /* Avatar — нижня половина екрану */
    .hero-avatar {
      position: absolute;
      bottom: -2%;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(350px, 48vw, 85vh);
      z-index: 10;
      pointer-events: none;
      will-change: transform;
    }

    .hero-avatar img {
      width: 90%;
      height: auto;
      display: block;
      /* Злегка зменшуємо тінь, щоб вона була акуратнішою на менших екранах */
      filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.6));
    }

    /* Subtitle */
    /* Головний контейнер для контенту під тайтлом */
    .hero-content-inner {
      position: absolute;
      bottom: 10vh;
      left: 50%;
      transform: translateX(-50%);
      width: 95vw;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 30;
      pointer-events: none;
    }

    .hero-subtitle,
    .hero-cta {
      pointer-events: auto;
      position: relative;
    }

    .hero-subtitle {
      text-align: left;
      font-size: clamp(1.5rem, 2.8vw, 3rem);
      /* Максимально жирний та великий шрифт */
      line-height: 1.1;
      font-weight: 600;
      animation: fadeLeft 0.8s 1s var(--ease-out) forwards;
    }

    /* Кнопка: чітко справа */
    .hero-cta {
      opacity: 0;
      animation: fadeRight 0.8s 1s var(--ease-out) forwards;
    }

    /* customers section */
    #customers {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--bg);
      overflow: hidden;
      z-index: 100;
    }

    .marquee-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      /* Менше простору між рядами */
      width: 100%;
    }

    .marquee-row {
      display: flex;
      gap: 15px;
      /* Менше простору між відосами */
      width: max-content;
      will-change: transform;
      transition:
        filter 0.8s ease-out,
        transform 0.1s linear;
    }

    /* Коли секція активна — блюр зникає (клас додамо через JS) */
    .marquee-row.active {
      filter: blur(0);
    }

    .marquee-item {
      /* Збільшив розмір на десктопі */
      width: clamp(400px, 40vw, 650px);
      aspect-ratio: 16 / 10;
      background: #151515;
      border-radius: 20px;
      overflow: hidden;
      flex-shrink: 0;
      transition: transform 0.4s var(--ease-out);
      cursor: none;
    }

    /* TILT ЕФЕКТ ПРИ НАВЕДЕННІ */
    .marquee-item:hover {
      transform: scale(1.08) rotate(2deg);
      z-index: 10;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
    }

    .marquee-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    #about {
      position: relative;
      width: 100vw;
      height: 120vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #080808;
      overflow: hidden;
    }

    .about-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0 20px;
      /* Відступи по боках для мобілок */
      box-sizing: border-box;
    }

    .about-title-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .about-description {
      margin-top: 20px;
      max-width: 900px;
      width: 100%;
    }

    .about-title-svg {
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .svg-outline,
    .svg-fill {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 450px;
      /* Твій розмір */
      font-weight: bold;
      text-transform: uppercase;
    }

    .svg-outline {
      fill: none;
      stroke: #fff;
      /* 1. Завжди 1px, незалежно від розміру тексту */
      stroke-width: 1px;
      vector-effect: non-scaling-stroke;

      /* 2. Малюємо тільки зовні (наскільки це можливо в SVG) */
      stroke-linejoin: round;
      paint-order: fill stroke;

      opacity: 0.4;
    }

    .svg-fill {
      fill: #fff;
      opacity: 0;
      /* Прибираємо обводку на шарі заливки, щоб не було "бруду" */
      stroke: none;
    }

    .about-description p {
      font-size: clamp(1.1rem, 2.5vw, 2.2rem);
      /* Гумовий шрифт */
      line-height: 1.4;
      margin: 10px 0;
    }

    .about-description p span {
      display: inline-block;
      font-family: "DM Sans", sans-serif;
      font-size: clamp(0.95rem, 2vw, 1.55rem);
      font-weight: 300;
      color: #edeae0;
      transform: translateY(100%) skewX(-10deg);
      opacity: 0;
      will-change: transform, opacity;
      font-size: 28px;
    }

    /* ── Об'єкти ── */
    .about-obj {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 36px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      z-index: 5;
      opacity: 0;
      will-change: transform, opacity;
    }

    .about-obj.o1 {
      top: 8%;
      left: 4%;
    }

    .about-obj.o2 {
      top: 20%;
      right: 8%;
    }

    .about-obj.o3 {
      top: 40%;
      right: 22%;
    }

    .about-obj.o4 {
      top: 62%;
      left: 18%;
    }

    .btn-contact {
      display: inline-flex;
      align-items: center;
      padding: 1.5rem 4rem;
      /* Збільшено площу кнопки */
      border-radius: 100px;
      border: 2px solid rgba(237, 234, 224, 0.6);
      background: transparent;
      color: var(--text);
      font-size: 1.1rem;
      /* Збільшено шрифт всередині */
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .btn-contact:hover {
      border-color: transparent;
      background: var(--accent-grad);
      transform: scale(1.04);
    }

    /* ── Keyframes ── */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeInAvatar {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(30px);
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeLeft {
      from {
        opacity: 0;
        transform: translateX(-14px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeRight {
      from {
        opacity: 0;
        transform: translateX(14px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Тільт тепер тільки для десктопів */
    @media (hover: hover) {
      .marquee-item:hover {
        transform: scale(1.05) rotate(1.5deg);
        z-index: 10;
      }
    }

    @media (max-width: 768px) {
      #about {
        height: 120vh;
        /* Трохи менше висоти для мобілок */
      }

      .about-content {
        gap: 15px;
      }

      /* Якщо об'єкти заважають читати текст на малому екрані — можна сховати 2 з 4 */
      #obj3,
      #obj4 {
        display: none;
      }

      .about-title-svg {
        width: 120%;
        /* Робимо заголовок трохи більшим за екран (виліт) для стилю */
        margin-left: -10%;
      }
    }

    /* Ховаємо об'єкти на моб для швидкості */

    /* Головний контейнер Title: піднімаємо трохи вище */
    .hero-title {
      top: 15% !important;
      /* Фіксуємо вище, щоб звільнити місце */
    }

    /* ГОЛОВА (АВАТАР) — ВОТ ЩО МІНЯЄМО: ПІДНІМАЄМО ВИЩЕ */
    .hero-avatar {
      left: 53% !important;
      bottom: 35% !important;
      /* Збільшив з 15% до 35%, щоб голова злетіла ВИЩЕ */
      width: 80vw !important;
      /* Ширина залиш, вона збс */
      opacity: 0.8 !important;
      /* Трохи прозоріше, щоб текст було видно краще, якщо накладеться */
    }

    /* Контенту: текст і кнопка внизу */
    .hero-content-inner {
      flex-direction: column;
      /* Стовпчик залиш */
      align-items: center;
      /* Центр залиш */
      gap: 1.8rem;
      /* Відступ трохи менше */
      bottom: 10vh !important;
      /* Нижче до краю залиш, щоб вони не заважали */
    }

    /* Текст: робимо компактним */
    .hero-subtitle {
      text-align: center;
      /* Центр */
      font-size: 1.1rem !important;
      /* Розмір залиш */
      max-width: 90% !important;
      /* Щоб не розлазився */
      /* Фон і блур для читабельності */
      background: rgba(8, 8, 8, 0.4);
      padding: 10px;
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    .marquee-item {
      width: 85vw;
      /* Майже на весь екран телефону */
    }

    .marquee-item:hover {
      transform: none !important;
    }

    .marquee-container {
      gap: 15px;
    }

    /* Кнопка: робимо акуратнішою */
    .btn-contact {
      padding: 1.1rem 2.5rem !important;
      font-size: 0.85rem !important;
    }
    }
  </style>
</head>

  <script>
    function fitTitle() {
      const title = document.getElementById("heroTitle");
      const avail = window.innerWidth * 0.95;

      // Крок 1: Скидаємо стилі для точного заміру
      title.style.display = "inline-block";
      title.style.fontSize = "100px";

      // Крок 2: Міряємо ширину самих літер
      const textWidth = title.getBoundingClientRect().width;

      // Крок 3: Розрахунок і застосування
      const newSize = (avail / textWidth) * 100;
      title.style.fontSize = newSize + "px";

      // Крок 4: Повертаємо центрування
      title.style.display = "flex";
    }

    // Виклик при старті та ресайзі
    window.addEventListener("resize", fitTitle);
    window.addEventListener("load", fitTitle);
    fitTitle();

    // Рух відео
    const rowTop = document.getElementById("rowTop");
    const rowBottom = document.getElementById("rowBottom");
    let scrollTimeout;

    window.addEventListener("scroll", () => {
      const scrollPos = window.pageYOffset;
      const isMobile = window.innerWidth <= 768;

      // ШВИДКІСТЬ: на десктопі 0.8/0.5, на мобілці 0.25/0.15 (повільніше)
      const speedTop = isMobile ? 0.25 : 0.8;
      const speedBottom = isMobile ? 0.15 : 0.5;

      const moveTop = scrollPos * speedTop;
      const moveBottom = scrollPos * speedBottom;

      if (rowTop) rowTop.style.transform = `translateX(-${moveTop}px)`;
      if (rowBottom)
        rowBottom.style.transform = `translateX(calc(-30% + ${moveBottom}px))`;

      // БЛЮР: Тільки для десктопів
      if (!isMobile) {
        rowTop.style.filter = "blur(2px)";
        rowBottom.style.filter = "blur(2px)";

        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
          rowTop.style.filter = "blur(0)";
          rowBottom.style.filter = "blur(0)";
        }, 150);
      } else {
        // На мобільних блюр завжди 0
        rowTop.style.filter = "none";
        rowBottom.style.filter = "none";
      }
    });

    // ── Cursor ───────────────────────────────────────
    const cursor = document.getElementById("cursor");
    const ring = document.getElementById("cursorRing");
    let mx = 0,
      my = 0,
      rx = 0,
      ry = 0;

    document.addEventListener("mousemove", (e) => {
      mx = e.clientX;
      my = e.clientY;
      cursor.style.left = mx + "px";
      cursor.style.top = my + "px";
    });
    (function loopRing() {
      rx += (mx - rx) * 0.13;
      ry += (my - ry) * 0.13;
      ring.style.left = rx + "px";
      ring.style.top = ry + "px";
      requestAnimationFrame(loopRing);
    })();

    document.querySelectorAll("a").forEach((el) => {
      el.addEventListener("mouseenter", () => {
        cursor.style.transform = "translate(-50%,-50%) scale(3)";
        ring.style.width = "54px";
        ring.style.height = "54px";
        ring.style.opacity = "0.4";
      });
      el.addEventListener("mouseleave", () => {
        cursor.style.transform = "translate(-50%,-50%) scale(1)";
        ring.style.width = "32px";
        ring.style.height = "32px";
        ring.style.opacity = "1";
      });
    });

    // ── Avatar parallax ──────────────────────────────
    const avatar = document.getElementById("avatar");
    let ax = 0,
      ay = 0,
      tx = 0,
      ty = 0;
    const isMobile = window.matchMedia("(max-width: 700px)").matches;

    if (!isMobile) {
      document.addEventListener("mousemove", (e) => {
        const nx = (e.clientX / window.innerWidth - 0.5) * 2;
        const ny = (e.clientY / window.innerHeight - 0.5) * 2;
        // Збільшив амплітуду, щоб було видно рух
        tx = nx * 50;
        ty = ny * 25;
      });
      (function loopAvatar() {
        ax += (tx - ax) * 0.08;
        ay += (ty - ay) * 0.08;

        // Обов'язково додаємо translateX(-50%), бо картинка центрована через цей хак
        // rotateY додає "об'єму" при русі
        avatar.style.transform = `translateX(calc(-50% + ${ax}px)) translateY(${ay}px) rotateY(${ax * 0.2}deg)`;

        requestAnimationFrame(loopAvatar);
      })();
    }

    // --- ABOUT SECTION SCROLL LOGIC ---
    (function () {
      const section = document.getElementById("about");
      const fill = document.getElementById("aboutTitleFill");
      const lines = [
        document.getElementById("line0"),
        document.getElementById("line1"),
        document.getElementById("line2"),
      ];

      // Коефіцієнт для мобілок (якщо ширина < 768px, зменшуємо рух у 2.5 рази)
      const m = window.innerWidth < 768 ? 0.4 : 1;

      const objs = [
        { el: document.getElementById("obj1"), speed: 1, fromY: -180 * m, fromX: -160 * m, rot: -15 },
        { el: document.getElementById("obj2"), speed: 0.8, fromY: -220 * m, fromX: 180 * m, rot: 20 },
        { el: document.getElementById("obj3"), speed: 0.5, fromY: -160 * m, fromX: 140 * m, rot: -10 },
        { el: document.getElementById("obj4"), speed: 0.3, fromY: -200 * m, fromX: -130 * m, rot: 12 },
      ];

      function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }
      function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

      function onScroll() {
        const rect = section.getBoundingClientRect();
        const winH = window.innerHeight;

        // Адаптивний офсет: на мобілках winH менший, тому 0.7 працює норм
        const offset = winH * 0.7;
        const p = clamp((winH - rect.top - offset) / (winH * 0.4), 0, 1);

        // 1. Title
        if (fill) fill.style.opacity = easeOut(clamp((p - 0.2) * 1.5, 0, 1));

        // 2. Рядки (зменшуємо translateX для мобілок через m)
        lines.forEach((line, i) => {
          if (!line) return;
          const lp = clamp((p - 0.2 - i * 0.1) / 0.5, 0, 1);
          const lep = easeOut(lp);
          line.style.transform = `translateX(${(1 - lep) * -50 * m}px) translateY(${(1 - lep) * 40 * m}px) skewX(${(1 - lep) * -10}deg)`;
          line.style.opacity = lep;
        });

        // 3. Об'єкти
        objs.forEach(({ el, speed, fromY, fromX, rot }) => {
          if (!el) return;
          const ep = easeOut(clamp(p * speed * 1.5, 0, 1));
          el.style.transform = `translate(${fromX * (1 - ep)}px, ${fromY * (1 - ep)}px) rotate(${rot * (1 - ep)}deg)`;
          el.style.opacity = ep;
        });
      }

      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
