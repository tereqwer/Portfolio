<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pavlo Tereshchuk — Motion Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --text: #edeae0;
      --accent-grad: linear-gradient(135deg, #a259ff 0%, #ff6b6b 50%, #ffa500 100%);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --nav-h: 64px;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Cursor ── */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--text);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: transform 0.1s ease;
    }

    .cursor-ring {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(237, 234, 224, 0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.25s ease, height 0.25s ease, opacity 0.25s ease;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(2rem, 4vw, 4rem);
      opacity: 0;
      animation: fadeDown 0.7s 0.1s var(--ease-out) forwards;
    }

    nav a {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: opacity 0.2s;
    }

    nav a::after {
      content: '';
      display: block;
      height: 1px;
      background: var(--text);
      width: 100%;
      transform: scaleX(0.4);
      transform-origin: left;
      transition: transform 0.3s var(--ease-out), opacity 0.3s;
      opacity: 0.35;
    }

    nav a:hover {
      opacity: 0.65;
    }

    nav a:hover::after {
      transform: scaleX(1);
      opacity: 1;
    }

    /* ── Hero ── */
    #hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Title — прямо під nav */
    .hero-title {
      position: absolute;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      /* Центруємо тільки по вертикалі */
      z-index: 1;

      display: flex;
      justify-content: center;
      /* Текст чітко по центру горизонталі */
      align-items: center;

      font-family: 'Bebas Neue', sans-serif;
      color: var(--text);
      user-select: none;
      white-space: nowrap;
      opacity: 0;
      animation: fadeDown 0.9s 0.35s var(--ease-out) forwards;
    }

    /* Якщо текст розбитий на спани і ти хочеш їх один під одним */
    .hero-title span {
      display: block;
      text-align: center;
      width: 100%;
    }

    /* Avatar — нижня половина екрану */
    .hero-avatar {
      position: absolute;
      bottom: -5%;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(360px, 48vw, 760px);
      z-index: 10;
      pointer-events: none;
      will-change: transform;
      opacity: 0;
      animation: fadeInAvatar 1s 0.7s var(--ease-out) forwards;
    }

    .hero-avatar img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 40px 80px rgba(0, 0, 0, 0.8));
    }

    /* Subtitle */
    .hero-subtitle {
      position: absolute;
      left: clamp(14rem, 12vw, 12rem);
      bottom: clamp(22rem, 12vh, 12rem);
      z-index: 20;
      max-width: 460px;
      font-size: clamp(1.4rem, 1.8vw, 1.4rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.8;
      color: var(--text);
      opacity: 0;
      animation: fadeLeft 0.8s 1s var(--ease-out) forwards;
    }

    /* CTA */
    .hero-cta {
      position: absolute;
      right: clamp(2rem, 4vw, 4rem);
      bottom: clamp(3rem, 8vh, 6rem);
      z-index: 20;
      opacity: 0;
      animation: fadeRight 0.8s 1s var(--ease-out) forwards;
    }

    .btn-contact {
      display: inline-flex;
      align-items: center;
      padding: 1.1rem 2.8rem;
      border-radius: 100px;
      border: 1.5px solid rgba(237, 234, 224, 0.5);
      background: transparent;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: none;
      transition: border-color 0.3s, background 0.3s, transform 0.2s;
      white-space: nowrap;
    }

    .btn-contact:hover {
      border-color: transparent;
      background: var(--accent-grad);
      transform: scale(1.04);
    }

    /* ── Keyframes ── */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeInAvatar {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes fadeLeft {
      from {
        opacity: 0;
        transform: translateX(-14px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeRight {
      from {
        opacity: 0;
        transform: translateX(14px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Mobile */
    @media (max-width: 700px) {
      nav {
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        padding: 1rem;
        height: auto;
      }

      :root {
        --nav-h: 80px;
      }

      .hero-subtitle {
        display: none;
      }

      .hero-cta {
        bottom: 2rem;
        right: 50%;
        transform: translateX(50%);
      }

      .hero-avatar {
        width: 82vw;
        bottom: 0;
      }
    }
  </style>
</head>

<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <nav>
    <a href="#about">About</a>
    <a href="#customers">Customers</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <section id="hero">
    <h1 class="hero-title" id="heroTitle">
      HI, I'M PAVLO
    </h1>

    <div class="hero-avatar" id="avatar">
      <img src="public/images/avatar.png" alt="Pavlo">
    </div>

    <p class="hero-subtitle">
      A motion designer<br>
      passionate about crafting<br>
      bold and memorable<br>
      projects 🤙
    </p>

    <div class="hero-cta">
      <a href="#contact" class="btn-contact">Contact me</a>
    </div>
  </section>

  <script>
    // ── Fit title to full width ──────────────────────
    function fitTitle() {
      const title = document.getElementById('heroTitle')
      const avail = window.innerWidth - 16
      title.style.fontSize = '100px'
      const longest = title.scrollWidth
      title.style.fontSize = Math.floor(500 * (avail / longest) * 0.97) + 'px'
    }
    fitTitle()
    window.addEventListener('resize', fitTitle)

    // ── Cursor ───────────────────────────────────────
    const cursor = document.getElementById('cursor')
    const ring = document.getElementById('cursorRing')
    let mx = 0, my = 0, rx = 0, ry = 0

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY
      cursor.style.left = mx + 'px'
      cursor.style.top = my + 'px'
    })
      ; (function loopRing() {
        rx += (mx - rx) * 0.13
        ry += (my - ry) * 0.13
        ring.style.left = rx + 'px'
        ring.style.top = ry + 'px'
        requestAnimationFrame(loopRing)
      })()

    document.querySelectorAll('a').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(3)'
        ring.style.width = '54px'
        ring.style.height = '54px'
        ring.style.opacity = '0.4'
      })
      el.addEventListener('mouseleave', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(1)'
        ring.style.width = '32px'
        ring.style.height = '32px'
        ring.style.opacity = '1'
      })
    })

    // ── Avatar parallax ──────────────────────────────
    const avatar = document.getElementById('avatar')
    let ax = 0, ay = 0, tx = 0, ty = 0

    document.addEventListener('mousemove', e => {
      const nx = (e.clientX / window.innerWidth - 0.5) * 2
      const ny = (e.clientY / window.innerHeight - 0.5) * 2
      tx = nx * 22
      ty = ny * 12
    })
      ; (function loopAvatar() {
        ax += (tx - ax) * 0.055
        ay += (ty - ay) * 0.055
        // base: translateX(-50%), додаємо offset зверху
        avatar.style.transform = `translateX(calc(-50% + ${ax}px)) translateY(${ay}px)`
        requestAnimationFrame(loopAvatar)
      })()
  </script>

</body>

</html>
