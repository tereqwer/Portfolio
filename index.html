<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pavlo Tereshchuk — Motion Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080808;
      --text: #edeae0;
      --accent-grad: linear-gradient(135deg, #a259ff 0%, #ff6b6b 50%, #ffa500 100%);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --nav-h: 64px;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Cursor ── */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--text);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: transform 0.1s ease;
    }

    .cursor-ring {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(237, 234, 224, 0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.25s ease, height 0.25s ease, opacity 0.25s ease;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(2rem, 4vw, 4rem);
      opacity: 0;
      animation: fadeDown 0.7s 0.1s var(--ease-out) forwards;
    }

    nav a {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: opacity 0.2s;
    }

    nav a::after {
      content: '';
      display: block;
      height: 1px;
      background: var(--text);
      width: 100%;
      transform: scaleX(0.4);
      transform-origin: left;
      transition: transform 0.3s var(--ease-out), opacity 0.3s;
      opacity: 0.35;
    }

    nav a:hover {
      opacity: 0.65;
    }

    nav a:hover::after {
      transform: scaleX(1);
      opacity: 1;
    }

    /* ── Hero ── */
    #hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Title — прямо під nav */
    .hero-title {
      position: absolute;
      top: 7vh;
      left: 3%;
      transform: translateX(-50%);
      /* Центруємо по горизонталі */
      width: auto;
      /* Важливо: ширина тільки по тексту */
      white-space: nowrap;
      z-index: 1;
      font-family: 'Bebas Neue', sans-serif;
      color: var(--text);
      line-height: 0.8;
      text-align: center;
      opacity: 0;
      animation: fadeDown 0.9s 0.35s var(--ease-out) forwards;
    }

    /* Якщо текст розбитий на спани і ти хочеш їх один під одним */
    .hero-title span {
      display: block;
      text-align: center;
      width: 100%;
    }

    /* Avatar — нижня половина екрану */
    .hero-avatar {
      position: absolute;
      bottom: -2%;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(350px, 48vw, 85vh);
      z-index: 10;
      pointer-events: none;
      will-change: transform;
    }

    .hero-avatar img {
      width: 90%;
      height: auto;
      display: block;
      /* Злегка зменшуємо тінь, щоб вона була акуратнішою на менших екранах */
      filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.6));
    }

    /* Subtitle */
    /* Головний контейнер для контенту під тайтлом */
    .hero-content-inner {
      position: absolute;
      bottom: 10vh;
      left: 50%;
      transform: translateX(-50%);
      width: 95vw;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 30;
      pointer-events: none;
    }

    .hero-subtitle,
    .hero-cta {
      pointer-events: auto;
      position: relative;
    }

    .hero-subtitle {
      text-align: left;
      font-size: clamp(1.5rem, 2.8vw, 3rem);
      /* Максимально жирний та великий шрифт */
      line-height: 1.1;
      font-weight: 600;
      animation: fadeLeft 0.8s 1s var(--ease-out) forwards;
    }

    /* Кнопка: чітко справа */
    .hero-cta {
      opacity: 0;
      animation: fadeRight 0.8s 1s var(--ease-out) forwards;
    }

    .btn-contact {
      display: inline-flex;
      align-items: center;
      padding: 1.5rem 4rem;
      /* Збільшено площу кнопки */
      border-radius: 100px;
      border: 2px solid rgba(237, 234, 224, 0.6);
      background: transparent;
      color: var(--text);
      font-size: 1.1rem;
      /* Збільшено шрифт всередині */
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .btn-contact:hover {
      border-color: transparent;
      background: var(--accent-grad);
      transform: scale(1.04);
    }

    /* ── Keyframes ── */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeInAvatar {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(30px);
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeLeft {
      from {
        opacity: 0;
        transform: translateX(-14px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeRight {
      from {
        opacity: 0;
        transform: translateX(14px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* --- ADAPTIVITY — БЛОК ЗМІНЕНО ЧІТКО ЗА ЗАПИТОМ --- */

    @media (max-width: 700px) {
      :root {
        --nav-h: 56px;
      }

      nav {
        justify-content: space-around;
        padding: 0 1rem;
      }

      nav a {
        font-size: 0.6rem;
        letter-spacing: 0.12em;
      }

      .hero-title {
        padding: 0 0.25rem;
      }

      /* ТАЙТЛ ТРІШЕЧКИ ВИЩЕ */
      .hero-title {
        top: 10% !important;
        /* Піднімаємо Title вище, щоб звільнити місце */
      }

      /* ГОЛОВА: ЦЕНТРУЄМО, ЗАБОРОНЯЄМО ПРОЗОРІСТЬ ТА ПІДНІМАЄМО */
      .hero-avatar {
        left: 55% !important;
        /* Силове центрування по горизонталі */
        /* TRANSFORM: залиш паралакс JS (loopAvatar), він має жорстке центрування `calc(-50% + ${ax}px)` */

        opacity: 1 !important;
        /* ПОВНІСТЮ НЕПРОЗОРА (Прибрав opacity: 0.8/0.7) */

        width: 80vw !important;
        /* Ширина залиш, вона збс */
        bottom: 25% !important;
        /* Піднімаємо голову вище, щоб звільнити місце знизу (раніше було 35%, поставив 25% щоб було трішечки вище) */
      }

      /* Контент (Текст і Кнопка) — нижче */
      .hero-content-inner {
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        /* Компактний відступ */
        bottom: 2.5rem !important;
        /* Нижче до краю, як в твоєму початковому коді */
        top: auto;
        /* Прибираємо позицію по вертикалі */
        transform: translateX(-50%);
        /* По горизонталі залишаємо */
      }

      /* Текст: компактний по центру */
      .hero-subtitle {
        display: none;
        /* Залиш, якщо ти його ховаєш на мобілці, або зроби text-align: center */
        /* text-align: center; */
        /* font-size: 0.9rem; */
      }

      .btn-contact {
        padding: 0.9rem 2rem;
        font-size: 0.75rem;
      }
    }
  </style>
</head>

<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <nav>
    <a href="#about">About</a>
    <a href="#customers">Customers</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contacts</a>
  </nav>

  <section id="hero">
    <h1 class="hero-title" id="heroTitle">HI, I'M PAVLO</h1>

    <div class="hero-content-inner">
      <p class="hero-subtitle">
        A motion designer<br>
        passionate about crafting<br>
        bold and memorable<br>
        projects 🤙
      </p>

      <div class="hero-cta">
        <a href="#contact" class="btn-contact">Contact me</a>
      </div>
    </div>

    <div class="hero-avatar" id="avatar">
      <img src="public/images/avatar.png" alt="Pavlo">
    </div>
  </section>

  <script>
    function fitTitle() {
      const title = document.getElementById('heroTitle');
      const avail = window.innerWidth * 0.95;

      // Крок 1: Скидаємо стилі для точного заміру
      title.style.display = 'inline-block';
      title.style.fontSize = '100px';

      // Крок 2: Міряємо ширину самих літер
      const textWidth = title.getBoundingClientRect().width;

      // Крок 3: Розрахунок і застосування
      const newSize = (avail / textWidth) * 100;
      title.style.fontSize = newSize + 'px';

      // Крок 4: Повертаємо центрування
      title.style.display = 'flex';
    }

    // Виклик при старті та ресайзі
    window.addEventListener('resize', fitTitle);
    window.addEventListener('load', fitTitle);
    fitTitle();

    // ── Cursor ───────────────────────────────────────
    const cursor = document.getElementById('cursor')
    const ring = document.getElementById('cursorRing')
    let mx = 0, my = 0, rx = 0, ry = 0

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY
      cursor.style.left = mx + 'px'
      cursor.style.top = my + 'px'
    })
      ; (function loopRing() {
        rx += (mx - rx) * 0.13
        ry += (my - ry) * 0.13
        ring.style.left = rx + 'px'
        ring.style.top = ry + 'px'
        requestAnimationFrame(loopRing)
      })()

    document.querySelectorAll('a').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(3)'
        ring.style.width = '54px'
        ring.style.height = '54px'
        ring.style.opacity = '0.4'
      })
      el.addEventListener('mouseleave', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(1)'
        ring.style.width = '32px'
        ring.style.height = '32px'
        ring.style.opacity = '1'
      })
    })

    // ── Avatar parallax ──────────────────────────────
    const avatar = document.getElementById('avatar')
    let ax = 0, ay = 0, tx = 0, ty = 0
    const isMobile = window.matchMedia('(max-width: 700px)').matches

    if (!isMobile) {
      document.addEventListener('mousemove', e => {
        const nx = (e.clientX / window.innerWidth - 0.5) * 2
        const ny = (e.clientY / window.innerHeight - 0.5) * 2
        // Збільшив амплітуду, щоб було видно рух
        tx = nx * 50
        ty = ny * 25
      })

        ; (function loopAvatar() {
          ax += (tx - ax) * 0.08
          ay += (ty - ay) * 0.08

          // Обов'язково додаємо translateX(-50%), бо картинка центрована через цей хак
          // rotateY додає "об'єму" при русі
          avatar.style.transform = `translateX(calc(-50% + ${ax}px)) translateY(${ay}px) rotateY(${ax * 0.2}deg)`

          requestAnimationFrame(loopAvatar)
        })()
    }
  </script>

</body>

</html>
